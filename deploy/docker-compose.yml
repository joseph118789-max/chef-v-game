services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        - VITE_API_URL=
    container_name: chef-v-game-frontend
    restart: unless-stopped
    ports:
      - "8085:80"  # Host port 8085 -> container 80 (8082=membership, 8083=minio, 8084=jenkins)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chef-v-game.rule=Host(`chef-v-game.seekn.site`)"
      - "traefik.http.routers.chef-v-game.entrypoints=web,websecure"
      - "traefik.http.routers.chef-v-game.tls=true"
      - "traefik.http.routers.chef-v-game.tls.certresolver=mytlschallenge"
      - "traefik.http.services.chef-v-game.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
